name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        # macOS は CI matrix から除外: 開発者のローカル環境が macOS のため日常的に
        # カバーされており、GitHub Actions の macOS arm64 runner は mDNSResponder
        # 起因で `HTTPServer.server_bind` 内の `getfqdn` が hang する固有問題があり、
        # production code を runner 都合で歪めるよりはここで切る (Issue #24 / PR #31)。
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run pytest
        run: python -m pytest tests/ -q

  pytest-no-python-alias:
    # `python3` のみ存在し `python` alias が無い環境 (Ubuntu 22+ / macOS Homebrew
    # のデフォルト) で hook の bash POSIX `command -v` fallback が動くことを
    # 常時回帰防止する専用ジョブ (Issue #33 で導入)。
    #
    # job 名から `Issue #33 regression guard` を削除した経緯:
    # GitHub Actions が check 名内の `#` を URL fragment として処理する関係で
    # 43 文字目で truncate → branch protection rule で完全一致 match できず
    # main への merge が永久 BLOCKED になる罠を踏んだ。`#` を含む job 名は
    # protection rule 上で扱いづらいため、 ここでは「what」のみ短く記述し、
    # 「why (regression guard for Issue #33)」は本コメントで永続化する。
    name: pytest (Ubuntu, no python alias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Remove `python` symlink (simulate Ubuntu 22+ / macOS Homebrew default)
        run: |
          # actions/setup-python は便宜上 `python` alias も作るが、本ジョブでは
          # `python3` のみ存在する distro デフォルト環境を再現するため除去する。
          # ubuntu-24.04 では `python` が PATH 上の複数箇所 (hostedtoolcache + /usr/bin)
          # にある場合があるため、解決できなくなるまでループで除去する。
          while command -v python >/dev/null 2>&1; do
            p="$(command -v python)"
            echo "Removing $p"
            # `/usr/bin/python` (python-is-python3 由来) は root 所有のため sudo が必要
            sudo rm -f "$p"
            hash -r 2>/dev/null || true
          done
          if command -v python >/dev/null 2>&1; then
            echo "ERROR: python alias still exists at $(command -v python)"
            exit 1
          fi
          command -v python3
      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest
      - name: Run pytest
        run: python3 -m pytest tests/ -q
      - name: Smoke test — bash POSIX `command -v` fallback resolves
        run: bash -c '$(command -v python3 || command -v python) -c "import sys; print(sys.version)"'
